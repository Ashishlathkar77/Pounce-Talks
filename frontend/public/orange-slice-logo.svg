<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 28" fill="none">
  <!-- Half-dome orange slice icon: filled semicircle, center (14,24), r=14 -->
  <path d="M0 24 A14 14 0 0 0 28 24 Z" fill="#000"/>
  <!-- White segment dividers from center (14,24) to arc -->
  <line x1="14" y1="24" x2="1.4"  y2="17.9"  stroke="white" stroke-width="1.4"/>
  <line x1="14" y1="24" x2="5.25" y2="13.07" stroke="white" stroke-width="1.4"/>
  <line x1="14" y1="24" x2="10.9" y2="10.35" stroke="white" stroke-width="1.4"/>
  <line x1="14" y1="24" x2="14"   y2="10"    stroke="white" stroke-width="1.4"/>
  <line x1="14" y1="24" x2="17.1" y2="10.35" stroke="white" stroke-width="1.4"/>
  <line x1="14" y1="24" x2="22.8" y2="13.07" stroke="white" stroke-width="1.4"/>
  <line x1="14" y1="24" x2="26.6" y2="17.9"  stroke="white" stroke-width="1.4"/>
  <!-- "Orange Slice" wordmark -->
  <text x="36" y="20"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="15" font-weight="500" fill="#000" letter-spacing="-0.2">Orange Slice</text>
</svg>
